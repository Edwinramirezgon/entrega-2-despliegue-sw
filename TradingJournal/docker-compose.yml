services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tradingjournal-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: TradingJournal.API/Dockerfile
    container_name: tradingjournal-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__WindowsSecurity: Server=sqlserver,1433;Database=TradingJournal;User Id=sa;Password=${SA_PASSWORD};Encrypt=False;TrustServerCertificate=True;
    ports:
      - "8080:8080"

volumes:
  sql_data:
